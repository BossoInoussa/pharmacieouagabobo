<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PharmaBF — Administration</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--or:#C85A00;--gn:#1A6B3C;--cream:#FDF6EE;--dark:#1C1007}
  body{font-family:system-ui,sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 4px 32px rgba(200,90,0,.1)}
  .logo{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-bottom:1.8rem}
  .logo-cross{width:44px;height:44px;background:var(--or);border-radius:10px;display:flex;align-items:center;justify-content:center}
  .logo-cross svg{width:24px;height:24px}
  .logo-text{font-size:1.4rem;font-weight:700;color:var(--or)}
  h1{font-size:1.1rem;font-weight:600;color:var(--dark);margin-bottom:.3rem}
  .sub{font-size:.82rem;color:#888;margin-bottom:1.6rem}
  label{display:block;font-size:.8rem;font-weight:600;color:#555;margin-bottom:.3rem;margin-top:1rem}
  input{width:100%;border:1.5px solid #ddd;border-radius:10px;padding:.65rem .9rem;font-size:.95rem;outline:none;transition:border .15s}
  input:focus{border-color:var(--or)}
  .btn{width:100%;background:var(--or);color:#fff;border:none;border-radius:10px;padding:.75rem;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1.4rem;transition:opacity .15s}
  .btn:hover{opacity:.88}
  .error{background:#fff0ed;border:1px solid #f5b8a8;border-radius:8px;padding:.6rem .9rem;font-size:.82rem;color:#c0392b;margin-top:1rem}
  .back{display:block;text-align:center;margin-top:1.2rem;font-size:.82rem;color:#888;text-decoration:none}
  .back:hover{color:var(--or)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-cross">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="10" y="2" width="4" height="20" rx="2" fill="white"/>
        <rect x="2" y="10" width="20" height="4" rx="2" fill="white"/>
      </svg>
    </div>
    <span class="logo-text">PharmaBF</span>
  </div>
  <h1>Espace Administration</h1>
  <p class="sub">Connectez-vous pour gérer les pharmacies</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label for="username">Identifiant</label>
    <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    <button class="btn" type="submit">Se connecter</button>
  </form>
  <a href="/" class="back">← Retour à l'application</a>
</div>
</body>
</html>
